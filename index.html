<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RepuestosXExpress - Buscador Inteligente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>⚡ RepuestosXExpress</h1>
        <p class="subtitulo">Encuentra tu repuesto original para carros chinos al instante</p>
    </header>

    <main>
        <section class="search-section">
            <h2>¿Qué repuesto buscas hoy?</h2>
            <div class="form-group">
                <select id="marcaSelect">
                    <option value="">Selecciona Marca</option>
                    <option value="JAC">JAC</option>
                    <option value="Changan">Changan</option>
                    <option value="Chery">Chery</option>
                    <option value="Saipa">Saipa</option>
                    <option value="Dongfeng">Dongfeng</option>
                    <option value="GAC">GAC Motor</option>
                </select>
                <input type="text" id="buscarInput" placeholder="Ej: Pastillas de freno, Filtro de aceite...">
                <button id="btnBuscar">Buscar Repuesto</button>
            </div>
        </section>

        <section class="results-section">
            <h3>Resultados encontrados:</h3>
            <div id="listaResultados" class="grid-resultados">
                <p class="placeholder-text">Selecciona una marca y escribe una pieza para saber dónde comprarla.</p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 RepuestosXExpress - Desarrollado por omarjsf</p>
    </footer>

    <script src="app.js"></script>
</body>
</html>
